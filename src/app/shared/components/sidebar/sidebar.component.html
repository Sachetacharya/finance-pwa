<aside class="sidebar" [class.sidebar--open]="isOpen()">
  <div class="sidebar__brand">
    <span class="sidebar__logo">💰</span>
    <div>
      <div class="sidebar__app-name">FinanceApp</div>
      <div class="sidebar__app-tagline">Expense Manager</div>
    </div>
  </div>

  <nav class="sidebar__nav" aria-label="Main navigation">
    <span class="sidebar__section-label">Main Menu</span>
    @for (item of navItems; track item.path) {
      <a
        class="sidebar__link"
        [class.sidebar__link--active]="isActive(item.path)"
        [routerLink]="item.path"
        (click)="onNavClick()"
        [attr.aria-label]="item.label"
      >
        <span class="sidebar__icon" aria-hidden="true">{{ item.icon }}</span>
        <span class="sidebar__label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    <button class="sidebar__theme-btn" (click)="theme.toggle()" [attr.aria-label]="theme.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
      <span class="sidebar__theme-icon">{{ theme.isDarkMode() ? '☀️' : '🌙' }}</span>
      <span class="sidebar__theme-label">{{ theme.isDarkMode() ? 'Light Mode' : 'Dark Mode' }}</span>
    </button>
    <div class="sidebar__footer-badge">
      <span aria-hidden="true">⚡</span>
      <div>
        <div class="sidebar__footer-title">PWA Ready</div>
        <div class="sidebar__footer-sub">Works offline</div>
      </div>
    </div>
  </div>
</aside>

@if (isOpen()) {
  <div class="sidebar-overlay" (click)="closed.emit()" aria-hidden="true"></div>
}
