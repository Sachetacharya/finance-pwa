<div class="dialog-overlay" (click)="cancelled.emit()" role="presentation">
  <div class="dialog" (click)="$event.stopPropagation()" role="dialog" [attr.aria-label]="title()">
    <div class="dialog__header">
      <h3 class="dialog__title">{{ title() }}</h3>
    </div>
    <div class="dialog__body">
      <p>{{ message() }}</p>
    </div>
    <div class="dialog__footer">
      <button class="btn btn--ghost" (click)="cancelled.emit()">{{ cancelText() }}</button>
      <button
        class="btn"
        [class.btn--danger]="danger()"
        [class.btn--primary]="!danger()"
        (click)="confirmed.emit()"
      >
        {{ confirmText() }}
      </button>
    </div>
  </div>
</div>
