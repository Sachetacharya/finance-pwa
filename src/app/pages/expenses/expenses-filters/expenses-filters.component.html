<div class="toolbar">
  <input
    class="toolbar__search search-input form-control"
    type="text"
    [value]="filter().search"
    (input)="searchChange.emit($any($event.target).value)"
    placeholder="Search by title or notes..."
  />
  <div class="filter-btn-wrap">
    <button
      class="btn btn--ghost btn--sm filter-toggle"
      [class.filter-toggle--active]="showFilters() || activeFilterCount() > 0"
      (click)="toggleFilters.emit()"
    >
      <ng-icon name="lucideFilter" size="14" /> Filters
      @if (activeFilterCount() > 0) {
        <span class="filter-badge">{{ activeFilterCount() }}</span>
      }
    </button>

    @if (showFilters()) {
      <div class="filter-backdrop" (click)="toggleFilters.emit()"></div>
      <div class="filter-panel" (click)="$event.stopPropagation()">
        <div class="filter-panel__header">
          <span class="filter-panel__title">Filters</span>
          @if (activeFilterCount() > 0) {
            <button class="filter-panel__clear" (click)="clearFilters.emit()"><ng-icon name="lucideX" size="12" /> Clear all</button>
          }
        </div>
        <div class="filter-grid">
          <div class="filter-field">
            <label class="filter-label">Type</label>
            <select class="form-control" [value]="filter().type"
              (change)="filterChange.emit({ key: 'type', value: $any($event.target).value }); filterChange.emit({ key: 'category', value: '' })">
              <option value="">All Types</option>
              <option value="expense">Expense</option>
              <option value="income">Income</option>
              <option value="transfer">Transfer</option>
            </select>
          </div>
          <div class="filter-field">
            <label class="filter-label">{{ filter().type === 'income' ? 'Income Source' : 'Category' }}</label>
            <select class="form-control" [value]="filter().category"
              (change)="filterChange.emit({ key: 'category', value: $any($event.target).value })">
              <option value="">{{ filter().type === 'income' ? 'All Sources' : 'All Categories' }}</option>
              @for (cat of filteredCategories(); track cat[0]) {
                <option [value]="cat[0]">{{ cat[1] }}</option>
              }
            </select>
          </div>
          <div class="filter-field">
            <label class="filter-label">Payment Method</label>
            <select class="form-control" [value]="filter().paymentMethod"
              (change)="filterChange.emit({ key: 'paymentMethod', value: $any($event.target).value })">
              <option value="">All Methods</option>
              <option value="cash">Cash</option>
              @for (acc of accountService.accounts(); track acc.id) {
                <option [value]="acc.id">{{ acc.name }}</option>
              }
              <option value="deleted-account">Deleted Account</option>
            </select>
          </div>
          <div class="filter-field">
            <label class="filter-label">From Date</label>
            <input class="form-control" type="date"
              [value]="filter().startDate ?? ''"
              (change)="filterChange.emit({ key: 'startDate', value: $any($event.target).value })" />
          </div>
          <div class="filter-field">
            <label class="filter-label">To Date</label>
            <input class="form-control" type="date"
              [value]="filter().endDate ?? ''"
              (change)="filterChange.emit({ key: 'endDate', value: $any($event.target).value })" />
          </div>
          <div class="filter-field">
            <label class="filter-label">Min Amount</label>
            <input class="form-control" type="number"
              [value]="filter().minAmount ?? ''"
              (change)="amountFilterChange.emit({ key: 'minAmount', value: $any($event.target).value === '' ? undefined : +$any($event.target).value })"
              placeholder="0" min="0" step="100" />
          </div>
          <div class="filter-field">
            <label class="filter-label">Max Amount</label>
            <input class="form-control" type="number"
              [value]="filter().maxAmount ?? ''"
              (change)="amountFilterChange.emit({ key: 'maxAmount', value: $any($event.target).value === '' ? undefined : +$any($event.target).value })"
              placeholder="∞" min="0" step="100" />
          </div>
        </div>
      </div>
    }
  </div>
</div>
