<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Coin circle -->
  <circle cx="256" cy="240" r="120" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="24"/>
  <circle cx="256" cy="240" r="120" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4"/>

  <!-- Inner coin detail -->
  <circle cx="256" cy="240" r="80" fill="rgba(255,255,255,0.08)"/>

  <!-- Trend line going up -->
  <polyline
    points="140,340 200,300 260,260 310,210 370,160"
    fill="none"
    stroke="url(#line)"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Arrow head on trend line -->
  <polyline
    points="340,165 370,160 365,190"
    fill="none"
    stroke="#ffffff"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Small dots on the line -->
  <circle cx="200" cy="300" r="6" fill="#ffffff" opacity="0.6"/>
  <circle cx="260" cy="260" r="6" fill="#ffffff" opacity="0.7"/>
  <circle cx="310" cy="210" r="6" fill="#ffffff" opacity="0.8"/>

  <!-- Subtle "F" text in coin center -->
  <text x="256" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="72" fill="rgba(255,255,255,0.9)" dominant-baseline="middle">F</text>

  <!-- Bottom label line -->
  <rect x="180" y="400" width="152" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
</svg>
